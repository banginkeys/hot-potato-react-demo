<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-labelledby="title desc">
  <title id="title">Chunky potato thermometer</title>
  <desc id="desc">A playful game-style thermometer shaped like a little potato, with a hot red bulb and goofy face.</desc>
  <defs>
    <linearGradient id="potatoSkin" x1="50" y1="22" x2="166" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffd97b"/>
      <stop offset="0.5" stop-color="#d99b45"/>
      <stop offset="1" stop-color="#9c632c"/>
    </linearGradient>
    <linearGradient id="glassTube" x1="88" y1="31" x2="140" y2="161" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff9e7"/>
      <stop offset="0.58" stop-color="#f4f8ff"/>
